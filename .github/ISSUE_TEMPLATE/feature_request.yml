name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for gl-tailscale-fix? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: What would you like to see?
      description: Describe the feature or enhancement.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
    validations:
      required: true

  - type: input
    id: router-model
    attributes:
      label: Router Model (if relevant)
      description: GL.iNet model name
      placeholder: GL-AXT1800

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else — screenshots, links, related features, etc.
